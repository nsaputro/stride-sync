name: "StrideSync (dev)"
description: >-
  [DEV CHANNEL] Syncs Garmin Connect running data and exposes it to Claude via MCP for
  conversational analysis — cadence, pace, heart-rate trends, training load.
version: "0.1.1b1"
slug: "stridesync_dev"
init: false
arch:
  - aarch64
  - amd64
url: "https://github.com/nsaputro/stride-sync"
# Same image repo as stable — only the version tag differs. The pre-release workflow updates
# the version field below; it never touches stridesync/config.yaml.
image: "ghcr.io/nsaputro/stride-sync/{arch}-stridesync"
homeassistant: "2024.1.0"

# No ingress — see stridesync/config.yaml for the reasoning (unchanged for the dev channel).

# Host port offset by 1 from stable (8765) so both can run installed side by side.
ports:
  8765/tcp: 8766
ports_description:
  8765/tcp: "[DEV] MCP server (Streamable HTTP) — default host port 8766, alongside stable on 8765"

map:
  - data:rw

options:
  garmin_username: ""
  garmin_password: ""
  sync_interval_hours: 6
  mcp_port: 8765
  log_level: "info"

schema:
  garmin_username: str
  garmin_password: password
  sync_interval_hours: int(1,24)
  mcp_port: port
  log_level: list(debug|info|warning|error)
