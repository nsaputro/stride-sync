name: Pre-Release

on:
  workflow_dispatch:

permissions:
  contents: write    # push tag
  packages: write    # push to ghcr.io

jobs:
  # ── Read version from stridesync-dev/config.yaml and validate ────────────────
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate version
        id: ver
        run: |
          VERSION=$(python3 -c "import yaml; print(yaml.safe_load(open('stridesync-dev/config.yaml'))['version'])")
          echo "stridesync-dev version: $VERSION"

          # Must have a pre-release suffix — pure X.Y.Z goes through the Release workflow
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::$VERSION is a stable version. Use the Release workflow, or add a pre-release suffix (b1, rc1, etc.) to stridesync-dev/config.yaml."
            exit 1
          fi

          # Fail if this tag already exists (already released)
          if git ls-remote --tags origin "refs/tags/v${VERSION}" | grep -q .; then
            echo "::error::v${VERSION} is already released. Bump the version in stridesync-dev/config.yaml."
            exit 1
          fi

          # Tag the current commit
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"

  # ── Build & push one image per architecture (version tag only, no :latest) ───
  build-and-push:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            base: ghcr.io/hassio-addons/base:18.0.1
            platform: linux/amd64
          - arch: aarch64
            base: ghcr.io/hassio-addons/base:18.0.1
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-version.outputs.tag }}

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (pre-release tag only — :latest is never touched)
        uses: docker/build-push-action@v7
        with:
          context: stridesync
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.base }}
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.arch }}-stridesync:${{ needs.check-version.outputs.version }}
          labels: |
            org.opencontainers.image.title=StrideSync (${{ matrix.arch }}) pre-release
            org.opencontainers.image.description=Developer pre-release — not for production
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.check-version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.arch }}-stridesync:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/${{ matrix.arch }}-stridesync:cache,mode=max
