name: CI

on:
  push:
    branches:
      - main
      - dev
      - "claude/**"
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Bot-created PRs (post-release chore) are exempt from all checks so they can
# be merged without waiting for CI. The ci-pass job enforces this exemption while
# still being the single required status check for branch protection.
#
# Each job carries:
#   if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
# so the job is *skipped* (not failed) on bot PRs. ci-pass then exits 0 for those.

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: >-
            stridesync/config.yaml stridesync/build.yaml
            stridesync-dev/config.yaml stridesync-dev/build.yaml
          config_file: .yamllint.yml

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: stridesync/Dockerfile
          ignore: DL3018,DL3013   # apk/pip --no-cache warnings suppressed

      - name: Validate addon config.yaml files
        run: |
          python3 - <<'EOF'
          import yaml, sys, re

          def ver_tuple(v):
              """Parse the MAJOR.MINOR.PATCH prefix of a version string into a tuple."""
              m = re.match(r"(\d+)\.(\d+)\.(\d+)", v)
              return tuple(int(x) for x in m.groups()) if m else (0, 0, 0)

          configs = ["stridesync/config.yaml", "stridesync-dev/config.yaml"]
          required = ["name", "description", "version", "slug", "arch", "init"]
          ok = True
          versions = {}
          for path in configs:
              with open(path) as f:
                  cfg = yaml.safe_load(f)
              missing = [k for k in required if k not in cfg]
              if missing:
                  print(f"ERROR: {path} missing required keys: {missing}")
                  ok = False
              else:
                  versions[path] = cfg["version"]
                  print(f"{path} OK — version {cfg['version']}, slug {cfg['slug']}")

          try:
              next_ver = open("stridesync/NEXT_VERSION").read().strip()
          except FileNotFoundError:
              next_ver = None

          if next_ver:
              print(f"stridesync/NEXT_VERSION : {next_ver}")
              released = versions.get("stridesync/config.yaml", "")
              dev      = versions.get("stridesync-dev/config.yaml", "")

              if released and ver_tuple(next_ver) <= ver_tuple(released):
                  print(f"ERROR: NEXT_VERSION ({next_ver}) must be greater than "
                        f"config.yaml released version ({released})")
                  ok = False
              else:
                  print(f"Version ordering OK: released={released} < next={next_ver}")

              if dev and not dev.startswith(next_ver):
                  print(f"ERROR: stridesync-dev version ({dev}) must start with NEXT_VERSION ({next_ver})")
                  ok = False
              elif dev:
                  print(f"Dev pre-release OK: {dev} matches NEXT_VERSION {next_ver}")

          if not ok:
              sys.exit(1)
          EOF

  # ── Python syntax ────────────────────────────────────────────────────────────
  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Check stridesync/app Python files
        run: |
          python3 - <<'EOF'
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path("stridesync/app").rglob("*.py"):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f"{f}: {e}")
          if errors:
              print("Syntax errors found:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)
          print(f"All {len(list(pathlib.Path('stridesync/app').rglob('*.py')))} Python files OK")
          EOF

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [python-syntax]
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            stridesync/app/requirements.txt
            stridesync/requirements-test.txt

      - name: Install dependencies
        run: pip install -r stridesync/app/requirements.txt -r stridesync/requirements-test.txt

      - name: Run tests
        working-directory: stridesync
        run: python -m pytest tests/ -v --tb=short

  # ── Docker build + smoke test (amd64 only, no push) ───────────────────────────
  build-test:
    name: Docker build + smoke test (amd64)
    runs-on: ubuntu-latest
    needs: [lint, python-syntax, test]
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build addon image (no push, loaded locally so it can be run below)
        uses: docker/build-push-action@v7
        with:
          context: stridesync
          push: false
          load: true
          platforms: linux/amd64
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base:18.0.1
          tags: stridesync-ha:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # A successful `docker build` only proves the image compiles — it does not prove the s6
      # services inside it actually start. v0.1.0 shipped with a Dockerfile bug
      # (COPY app/ . flattened the app/ package into WORKDIR, so `python3 -m app.mcp.server`
      # couldn't find a package called "app") that this build-only test never caught. This step
      # actually runs the built image and checks all s6 services come up without crashing.
      - name: Run container smoke test
        run: |
          mkdir -p /tmp/stridesync-smoke-data
          cat > /tmp/stridesync-smoke-data/options.json <<'EOF'
          {
            "garmin_username": "smoke-test@example.com",
            "garmin_password": "smoke-test-password",
            "sync_interval_hours": 6,
            "mcp_port": 8765,
            "log_level": "info"
          }
          EOF

          CONTAINER_ID=$(docker run -d \
            -p 18765:8765 \
            -p 18767:8767 \
            -v /tmp/stridesync-smoke-data:/data \
            stridesync-ha:ci)

          echo "Waiting for s6 services to start..."
          sleep 15

          echo "--- container logs ---"
          docker logs "$CONTAINER_ID" 2>&1 | tee /tmp/stridesync-smoke.log

          FAILED=0

          if [ "$(docker inspect -f '{{.State.Running}}' "$CONTAINER_ID")" != "true" ]; then
            echo "::error::Container exited unexpectedly — see logs above"
            FAILED=1
          fi

          if grep -qiE "ModuleNotFoundError|Traceback \(most recent call last\)" /tmp/stridesync-smoke.log; then
            echo "::error::Found a Python crash in container logs — see logs above"
            FAILED=1
          fi

          # Any HTTP response (even a 4xx from a bare request with no MCP handshake) proves the
          # server is bound and listening; a curl-level failure (connection refused, timeout)
          # means it isn't.
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:18765/mcp)
          CURL_EXIT=$?
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::error::MCP server unreachable on port 18765 (curl exit code $CURL_EXIT) — see logs above"
            FAILED=1
          else
            echo "MCP server responded with HTTP $HTTP_CODE (server is listening)"
          fi

          # MFA login ingress UI (app/mfa_web/server.py) — same "any HTTP response proves it's
          # listening" check as the MCP server above.
          MFA_HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:18767/)
          MFA_CURL_EXIT=$?
          if [ "$MFA_CURL_EXIT" -ne 0 ]; then
            echo "::error::MFA login web UI unreachable on port 18767 (curl exit code $MFA_CURL_EXIT) — see logs above"
            FAILED=1
          else
            echo "MFA login web UI responded with HTTP $MFA_HTTP_CODE (server is listening)"
          fi

          docker stop "$CONTAINER_ID" >/dev/null
          docker rm "$CONTAINER_ID" >/dev/null

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
          echo "Container smoke test passed: all three s6 services started without crashing."

  # ── Required gate ────────────────────────────────────────────────────────────
  # This is the ONLY job to add as a required status check in branch protection.
  # It passes immediately for bot-created PRs (post-release chore); for all other
  # PRs it verifies every upstream job succeeded.
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [lint, python-syntax, test, build-test]
    if: always()
    steps:
      - name: Check results
        env:
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
          R_LINT: ${{ needs.lint.result }}
          R_SYNTAX: ${{ needs.python-syntax.result }}
          R_TEST: ${{ needs.test.result }}
          R_BUILD: ${{ needs.build-test.result }}
        run: |
          if [[ "$EVENT" == "pull_request" && "$ACTOR" == "github-actions[bot]" ]]; then
            echo "Bot-created PR — CI checks are not required"
            exit 0
          fi
          failed=0
          for job_result in "$R_LINT" "$R_SYNTAX" "$R_TEST" "$R_BUILD"; do
            if [[ "$job_result" != "success" ]]; then
              echo "A required job did not succeed (result: $job_result)"
              failed=1
            fi
          done
          if [[ $failed -eq 1 ]]; then
            echo "One or more required CI checks failed or were skipped."
            exit 1
          fi
          echo "All CI checks passed."
