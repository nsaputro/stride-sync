name: "StrideSync"
description: >-
  Syncs Garmin Connect running data and exposes it to Claude via MCP for
  conversational analysis — cadence, pace, heart-rate trends, training load.
version: "0.1.0"
slug: "stridesync"
init: false
arch:
  - aarch64
  - amd64
url: "https://github.com/nsaputro/stride-sync"
# Pre-built images — HA substitutes {arch} (amd64, aarch64). Published starting at milestone v0.4.
image: "ghcr.io/nsaputro/stride-sync/{arch}-stridesync"
homeassistant: "2024.1.0"

# Ingress serves exactly one browser-facing page: the one-time Garmin MFA login (see
# app/mfa_web/server.py, PROJECT_PLAN.md's "Known risk" section). MCP clients (Claude Desktop,
# etc.) still reach the MCP server directly over the network below — ingress doesn't fit an MCP
# client's connection model, so it's not used for that. This revisits the original "no ingress"
# decision from milestone v0.4, which predates the MFA web UI.
ingress: true
ingress_port: 8767
panel_icon: mdi:run
panel_title: StrideSync

# MCP server — Streamable HTTP, reached remotely by MCP clients (e.g. via mcp-proxy)
ports:
  8765/tcp: 8765
ports_description:
  8765/tcp: "MCP server (Streamable HTTP) — point an MCP client (via mcp-proxy) at /mcp on this port"

# Persistent SQLite database + sync state
map:
  - data:rw

# User-configurable options
options:
  garmin_username: ""
  garmin_password: ""
  sync_interval_hours: 6
  mcp_port: 8765
  log_level: "info"
  mcp_auth_token: ""

schema:
  garmin_username: str
  garmin_password: password
  sync_interval_hours: int(1,24)
  mcp_port: port
  log_level: list(debug|info|warning|error)
  # Empty = no auth required (fine for LAN-only access). Set this before exposing mcp_port
  # beyond your LAN (e.g. via a Cloudflare Tunnel) — see PROJECT_PLAN.md milestone v0.6 and
  # DOCS.md. MCP clients must then send "Authorization: Bearer <this value>".
  mcp_auth_token: password
